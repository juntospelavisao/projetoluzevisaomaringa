<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Projeto Luz e Visão Maringá</title>
    
    <meta property="og:title" content="Cadastro - Projeto Luz e Visão Maringá">
    <meta property="og:description" content="Agendamento gratuito para atendimento oftalmológico em Maringá. Vagas limitadas para 26 e 27 de Junho!">
    <meta name="theme-color" content="#0d6efd">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0d6efd; --primary-dark: #0a58ca;
            --bg: #f8f9fa; --surface: #ffffff;
            --text-main: #212529; --text-muted: #6c757d;
            --error: #dc3545; --success: #198754;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; padding: 20px; margin: 0; min-height: 100vh; }

        .container { background-color: var(--surface); width: 100%; max-width: 640px; padding: 2.5rem; border-radius: var(--border-radius); box-shadow: 0 10px 30px rgba(0,0,0,0.05); animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { text-align: center; margin-bottom: 2rem; }
        .logo-placeholder { width: 70px; height: 70px; background: #e9ecef; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text-muted); font-size: 2rem; margin-bottom: 1rem; }
        
        h2 { margin: 0; color: var(--primary); font-weight: 700; font-size: 1.4rem; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-top: 8px; font-weight: 700; text-transform: uppercase; }

        h3 { font-size: 1.1rem; color: var(--text-main); margin-top: 2rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid #f1f3f5; }

        .row { display: flex; gap: 15px; } .col { flex: 1; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; color: #495057; }
        
        input:not([type="checkbox"]), select { width: 100%; padding: 12px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; transition: all 0.2s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1); }
        input[readonly] { background-color: #f8f9fa; cursor: not-allowed; }

        /* Agenda Options */
        .agenda-option { border: 2px solid #e9ecef; border-radius: var(--border-radius); padding: 15px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; transition: all 0.2s; }
        .agenda-option:hover { border-color: #cbd3da; }
        .agenda-option.selected { border-color: var(--primary); background-color: #f0f7ff; }
        .agenda-option input { margin-right: 15px; transform: scale(1.3); accent-color: var(--primary); }
        .agenda-date { font-weight: 700; font-size: 0.95rem; }
        .vagas { font-size: 0.85rem; color: var(--text-muted); margin-top: 3px; }

        .spinner-sm { width: 12px; height: 12px; border: 2px solid #ccc; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .terms-wrapper { background-color: #f8f9fa; padding: 12px; border-radius: 8px; font-size: 0.85rem; display: flex; gap: 10px; align-items: flex-start; margin-top: 15px; }

        button#btnEnviar { width: 100%; padding: 16px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: 700; margin-top: 20px; }
        button#btnEnviar:disabled { background-color: #ccc; cursor: not-allowed; }

        .error-msg { color: var(--error); font-size: 0.8rem; margin-top: 5px; display: none; font-weight: 600; }
        
        @media (max-width: 500px) { .row { flex-direction: column; gap: 0; } }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 16px; text-align: center; max-width: 400px; width: 90%; }
    </style>
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div class="container">
    <div class="header">
        <div class="logo-placeholder">👁️</div>
        <h2>Ficha de Cadastro</h2>
        <div class="subtitle">PROJETO LUZ E VISÃO<br>MARINGÁ - PR 2026</div>
    </div>
    
    <form name="submit-to-google-sheet" id="formCadastro">
        <h3>Dados do Paciente</h3>
        <div class="form-group"><label>Nome Completo *</label><input type="text" name="nome" id="nome" required></div>
        
        <div class="row">
            <div class="col form-group">
                <label>CPF *</label>
                <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                <div id="cpfError" class="error-msg">Este CPF já está cadastrado!</div>
            </div>
            <div class="col form-group">
                <label>WhatsApp *</label>
                <input type="tel" name="whatsapp" id="whatsapp" placeholder="(00) 00000-0000" maxlength="15" required>
            </div>
        </div>

        <div class="row">
            <div class="col form-group"><label>Nascimento *</label><input type="date" name="nascimento" id="nascimento" required><div id="msgIdade" class="error-msg"></div></div>
            <div class="col form-group" style="max-width: 80px;"><label>Idade</label><input type="text" name="idade" id="idade" readonly></div>
        </div>

        <h3>Agendamento (Escolha uma opção)</h3>
        <p id="status-vagas" style="font-size: 0.85rem; color: var(--primary);"><span class="spinner-sm"></span> Consultando disponibilidade...</p>

        <!-- SEXTA 26/06 - 135 VAGAS POR PERIODO -->
        <label class="agenda-option" id="opt-1" onclick="selectOption('1')">
            <input type="radio" name="agendamento" value="Sexta 26/06 - Manhã" required>
            <div class="agenda-content">
                <div class="agenda-date">Sexta-feira 26/06 - Manhã</div>
                <div class="vagas" id="vagas-1">Chegada ATÉ 08:30 • <span class="spinner-sm"></span></div>
            </div>
        </label>
        
        <label class="agenda-option" id="opt-2" onclick="selectOption('2')">
            <input type="radio" name="agendamento" value="Sexta 26/06 - Tarde">
            <div class="agenda-content">
                <div class="agenda-date">Sexta-feira 26/06 - Tarde</div>
                <div class="vagas" id="vagas-2">Chegada ATÉ 14:30 • <span class="spinner-sm"></span></div>
            </div>
        </label>

        <!-- SABADO 27/06 - 140 VAGAS POR PERIODO -->
        <label class="agenda-option" id="opt-3" onclick="selectOption('3')">
            <input type="radio" name="agendamento" value="Sábado 27/06 - Manhã">
            <div class="agenda-content">
                <div class="agenda-date">Sábado 27/06 - Manhã</div>
                <div class="vagas" id="vagas-3">Chegada ATÉ 08:30 • <span class="spinner-sm"></span></div>
            </div>
        </label>

        <label class="agenda-option" id="opt-4" onclick="selectOption('4')">
            <input type="radio" name="agendamento" value="Sábado 27/06 - Tarde">
            <div class="agenda-content">
                <div class="agenda-date">Sábado 27/06 - Tarde</div>
                <div class="vagas" id="vagas-4">Chegada ATÉ 14:30 • <span class="spinner-sm"></span></div>
            </div>
        </label>
       
        <label class="terms-wrapper">
            <input type="checkbox" name="termos" required>
            <span class="terms-text">Declaro ter 18 anos ou mais e autorizo o contato da equipe via WhatsApp.</span>
        </label>

        <button type="submit" id="btnEnviar">Confirmar Agendamento</button>
    </form>
</div>

<div id="modalSucesso" class="modal-overlay">
    <div class="modal-content">
        <h2 style="color: var(--success);">Agendado! ✓</h2>
        <p>Sua vaga em Maringá foi garantida. Verifique seu WhatsApp nos próximos dias.</p>
        <button onclick="window.location.reload()" style="background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer;">Fazer Novo Cadastro</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyAUjBHlG1PdFViaqTKr_yeEB2V569umYqkqb07jjoWyDDJlFT1fC5z1vCyXGkuVcjuug/exec'; 
    
    // Definição dos limites conforme solicitado
    const limites = {
        'Sexta 26/06 - Manhã': 135,
        'Sexta 26/06 - Tarde': 135,
        'Sábado 27/06 - Manhã': 140,
        'Sábado 27/06 - Tarde': 140
    };

    const form = document.forms['submit-to-google-sheet'];
    const btn = document.getElementById('btnEnviar');

    // Máscara de Telefone Corrigida
    document.getElementById('whatsapp').addEventListener('input', function(e) {
        let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
        e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
    });

    // Máscara de CPF
    document.getElementById('cpf').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');
        v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
        e.target.value = v;
    });

    // Validação de Idade (18+)
    document.getElementById('nascimento').addEventListener('change', function() {
        const nasc = new Date(this.value);
        const hoje = new Date();
        let idade = hoje.getFullYear() - nasc.getFullYear();
        const m = hoje.getMonth() - nasc.getMonth();
        if (m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--;
        
        document.getElementById('idade').value = idade;
        if(idade < 18) {
            document.getElementById('msgIdade').innerText = "🚫 Apenas para maiores de 18 anos.";
            document.getElementById('msgIdade').style.display = "block";
            btn.disabled = true;
        } else {
            document.getElementById('msgIdade').style.display = "none";
            btn.disabled = false;
        }
    });

    window.selectOption = function(id) {
        document.querySelectorAll('.agenda-option').forEach(el => el.classList.remove('selected'));
        const opt = document.getElementById(`opt-${id}`);
        if (!opt.querySelector('input').disabled) opt.classList.add('selected');
    }

    // Carregar Vagas Dinamicamente e Limpar Spinner
    window.addEventListener('load', () => {
        fetch(scriptURL).then(res => res.json()).then(data => {
            document.getElementById('status-vagas').style.display = 'none';
            const periodos = [
                { id: '1', key: 'Sexta 26/06 - Manhã', desc: 'Chegada ATÉ 08:30' },
                { id: '2', key: 'Sexta 26/06 - Tarde', desc: 'Chegada ATÉ 14:30' },
                { id: '3', key: 'Sábado 27/06 - Manhã', desc: 'Chegada ATÉ 08:30' },
                { id: '4', key: 'Sábado 27/06 - Tarde', desc: 'Chegada ATÉ 14:30' }
            ];

            periodos.forEach(p => {
                const ocupadas = data[p.key] || 0;
                const limite = limites[p.key];
                const restam = limite - ocupadas;
                const txtVagas = document.getElementById(`vagas-${p.id}`);
                const card = document.getElementById(`opt-${p.id}`);

                if(restam <= 0) {
                    txtVagas.innerHTML = `${p.desc} • <b style="color:red">ESGOTADO</b>`;
                    card.querySelector('input').disabled = true;
                    card.style.opacity = '0.5';
                    card.style.cursor = 'not-allowed';
                } else {
                    txtVagas.innerHTML = `${p.desc} • <b style="color:var(--success)">${restam} vagas</b>`;
                }
            });
        }).catch(() => {
            document.getElementById('status-vagas').innerHTML = "⚠️ Erro ao carregar vagas.";
            // Limpa spinners em caso de erro para não ficar rodando
            document.querySelectorAll('.vagas').forEach(v => { v.innerHTML = "Erro ao carregar"; });
        });
    });

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Enviando...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(r => r.json())
        .then(res => {
            if (res.result === 'success') {
                document.getElementById('modalSucesso').style.display = 'flex';
            } else {
                alert("Erro: CPF já cadastrado ou falha no servidor.");
                btn.disabled = false;
                btn.innerText = "Confirmar Agendamento";
            }
        }).catch(() => {
            alert("Erro de conexão.");
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
